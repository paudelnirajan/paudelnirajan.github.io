    <style>
        .post-wrap {
            max-width: 720px;
            margin: 0 auto;
            padding: clamp(64px, 10vw, 120px) clamp(20px, 5vw, 48px) 80px;
        }

        .post-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 40px;
            transition: color var(--transition), gap var(--transition);
        }
        .post-back:hover { color: var(--accent); gap: 12px; }
        .post-back i { font-size: 0.7rem; }

        .post-header { margin-bottom: 40px; }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .post-date {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--text-subtle);
        }

        .post-reading-time {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--text-subtle);
        }
        .post-reading-time::before { content: '\00B7'; margin-right: 16px; }

        .post-title {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--text);
            line-height: 1.15;
            margin-bottom: 20px;
        }

        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }
        .post-tags span {
            font-family: var(--mono);
            font-size: 0.68rem;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 100px;
            background: var(--surface-2);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .post-divider {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 36px 0;
        }

        .post-body {
            color: var(--text);
            line-height: 1.8;
            font-size: 1rem;
        }

        .post-body > * + * { margin-top: 1.4em; }

        .post-body h1,
        .post-body h2 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-top: 2.2em;
            margin-bottom: 0.6em;
            line-height: 1.25;
        }
        .post-body h1:first-child,
        .post-body h2:first-child { margin-top: 0; }

        .post-body h3 {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            margin-top: 1.8em;
            margin-bottom: 0.4em;
        }

        .post-body h4 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 1.5em;
            margin-bottom: 0.3em;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-family: var(--mono);
        }

        .post-body p { color: var(--text-muted); }

        .post-body strong { color: var(--text); font-weight: 600; }

        .post-body a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color var(--transition);
        }
        .post-body a:hover { color: var(--accent-dark); }

        .post-body ul,
        .post-body ol {
            padding-left: 1.4em;
            color: var(--text-muted);
        }
        .post-body ul { list-style: disc; }
        .post-body ol { list-style: decimal; }
        .post-body li + li { margin-top: 0.35em; }
        .post-body li strong { color: var(--text); }

        .post-body blockquote {
            border-left: 2px solid var(--accent);
            padding: 4px 0 4px 20px;
            margin: 1.8em 0;
            color: var(--text-muted);
            font-style: italic;
        }
        .post-body blockquote p { color: var(--text-muted); }

        .post-body code {
            font-family: var(--mono);
            font-size: 0.85em;
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text);
        }

        .post-body pre {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            overflow-x: auto;
            margin: 1.4em 0;
        }
        .post-body pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.82em;
        }

        .post-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.4em 0;
            font-size: 0.9rem;
        }
        .post-body th {
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }
        .post-body td {
            padding: 9px 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            vertical-align: top;
        }
        .post-body tr:last-child td { border-bottom: none; }

        .post-body hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 2em 0;
        }

        .post-body img {
            max-width: 100%;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            margin: 1.4em 0;
        }

        .post-loading,
        .post-error {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-muted);
        }
        .post-loading i,
        .post-error i {
            font-size: 2rem;
            margin-bottom: 16px;
            display: block;
            color: var(--text-subtle);
        }
        .post-error h2 { color: var(--text); margin-bottom: 8px; }
        .post-error a { color: var(--accent); text-decoration: underline; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .post-loading i { animation: spin 1s linear infinite; }

        @media (max-width: 768px) {
            .post-wrap { padding-top: 32px; }
        }
    </style>
</head>
